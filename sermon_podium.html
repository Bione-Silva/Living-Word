<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Word — Modo Púlpito</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#E8E0D8;font-family:Georgia,serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* TOP BAR */
.top{display:flex;align-items:center;gap:16px;padding:12px 24px;border-bottom:1px solid #111;flex-shrink:0;background:#0a0a0a}

.timer-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;min-width:110px}
.timer-display{font-size:34px;font-weight:700;font-family:monospace;letter-spacing:.05em;line-height:1}
.timer-action{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.12em;margin-top:2px}

.timer-bar-wrap{flex:1;height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden}
.timer-bar{height:100%;border-radius:3px;transition:width 1s linear,background .5s}

.top-controls{display:flex;align-items:center;gap:10px;flex-shrink:0}
.ctrl{display:flex;align-items:center;gap:5px;font-size:11px;color:#555;font-family:system-ui}
.ctrl label{cursor:pointer}
.ctrl input[type=number]{width:44px;background:#1a1a1a;border:1px solid #2a2a2a;color:#888;font-size:11px;border-radius:5px;padding:3px 5px;text-align:center;font-family:monospace}
.ctrl input[type=range]{width:72px;accent-color:#C4956A}
.btn-ctrl{background:#1a1a1a;border:1px solid #2a2a2a;color:#666;font-size:11px;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:system-ui}
.btn-ctrl:hover{background:#1e1e1e;color:#888}
.counter{font-size:11px;color:#444;font-family:system-ui;min-width:50px;text-align:center}
.btn-exit{background:#1a1a1a;border:1px solid #333;color:#777;font-size:11px;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:system-ui}
.btn-exit:hover{background:#222}

/* MAIN CONTENT */
.main-content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:40px 80px;overflow-y:auto}
.block-type-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;margin-bottom:20px;opacity:.5;font-family:system-ui}
.block-text{line-height:1.55;transition:font-size .2s}
.progress-dots{display:flex;gap:5px;margin-top:32px;flex-wrap:wrap}
.pdot{width:7px;height:7px;border-radius:50%;background:#1e1e1e;flex-shrink:0;transition:background .2s}
.pdot.done{background:#333}
.pdot.current{background:#C4956A;transform:scale(1.3)}

/* BOTTOM OUTLINE */
.bottom-outline{border-top:1px solid #111;padding:10px 20px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;background:#0a0a0a}
.ol-chip{padding:4px 11px;border-radius:7px;font-size:10px;font-family:system-ui;cursor:pointer;white-space:nowrap;border:1px solid transparent;transition:all .1s;flex-shrink:0}
.ol-chip:hover{opacity:.8}

/* NAV */
.nav-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px 16px;border-top:1px solid #111;background:#0a0a0a;flex-shrink:0}
.nav-btn{background:#141414;border:1px solid #222;color:#666;font-size:13px;padding:10px 28px;border-radius:9px;cursor:pointer;font-family:system-ui;transition:all .15s}
.nav-btn:hover:not(:disabled){background:#1e1e1e;color:#999}
.nav-btn:disabled{opacity:.2;cursor:default}
.nav-hint{font-size:10px;color:#333;font-family:system-ui;text-align:center}

/* COLOR SCHEMES PER TYPE */
.type-title      {color:#F5F0E8}
.type-big_idea   {color:#7AE09A}
.type-verse      {color:#8ABBE8;font-style:italic}
.type-point      {color:#F5D8B0}
.type-subpoint   {color:#C8A880}
.type-illustration{color:#F5D0A0}
.type-application{color:#7AE09A}
.type-quote      {color:#C8AAEA;font-style:italic}
.type-transition {color:#666}
.type-prayer     {color:#8ABBE8;font-style:italic}
.type-conclusion {color:#F5F0E8}
.type-call       {color:#FF9999}
.type-note       {color:#888800}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top">
  <div class="timer-wrap" id="timerWrap" onclick="toggleTimer()">
    <div class="timer-display" id="timerDisplay">40:00</div>
    <div class="timer-action" id="timerAction">&#9654; Iniciar</div>
  </div>

  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timerBar" style="width:0%;background:#44DD88"></div>
  </div>

  <div class="top-controls">
    <div class="ctrl">
      <span>&#9201;</span>
      <input type="number" id="timerMinInput" value="40" min="5" max="180" onchange="setTimerMin(this.value)"> min
    </div>
    <button class="btn-ctrl" onclick="resetTimer()">Reset</button>
    <div class="ctrl">
      <span>Aa</span>
      <input type="range" id="fontRange" min="16" max="52" value="30" oninput="setFontSize(this.value)">
      <span id="fontSizeLabel" style="color:#555;font-family:monospace;font-size:10px">30</span>
    </div>
    <span class="counter" id="blockCounter">1/1</span>
    <button class="btn-exit" onclick="window.close()">Sair (Esc)</button>
  </div>
</div>

<!-- MAIN BLOCK CONTENT -->
<div class="main-content" id="mainContent">
  <div class="block-type-label" id="currentTypeLabel">Carregando...</div>
  <div class="block-text type-title" id="currentText" style="font-size:30px">Aguardando dados do editor...</div>
  <div class="progress-dots" id="progressDots"></div>
</div>

<!-- BOTTOM OUTLINE -->
<div class="bottom-outline" id="bottomOutline"></div>

<!-- NAV BAR -->
<div class="nav-bar">
  <button class="nav-btn" id="btnPrev" onclick="go(-1)" disabled>&#8592; Anterior</button>
  <div class="nav-hint">&#8592; &#8594; para navegar &nbsp;|&nbsp; Espa&#231;o para avan&#231;ar &nbsp;|&nbsp; Esc para sair</div>
  <button class="nav-btn" id="btnNext" onclick="go(1)">Pr&#243;ximo &#8594;</button>
</div>

<script>
const TYPES={
  title:        {label:'Título',         icon:'T',  color:'#C4956A'},
  big_idea:     {label:'Grande Ideia',   icon:'✦',  color:'#7AE09A'},
  verse:        {label:'Versículo',      icon:'†',  color:'#8ABBE8'},
  point:        {label:'Ponto Principal',icon:'→',  color:'#F5D8B0'},
  subpoint:     {label:'Subponto',       icon:'·',  color:'#C8A880'},
  illustration: {label:'Ilustração',     icon:'◎',  color:'#F5D0A0'},
  application:  {label:'Aplicação',      icon:'★',  color:'#7AE09A'},
  quote:        {label:'Citação',        icon:'"',  color:'#C8AAEA'},
  transition:   {label:'Transição',      icon:'⤷',  color:'#555'},
  prayer:       {label:'Oração',         icon:'✝',  color:'#8ABBE8'},
  conclusion:   {label:'Conclusão',      icon:'◉',  color:'#F5F0E8'},
  call:         {label:'Chamada Final',  icon:'!',  color:'#FF9999'},
  note:         {label:'Nota Pessoal',   icon:'✎',  color:'#888800'},
};

let visibleBlocks = [];
let currentIdx = 0;
let timerTotal = 40*60;
let timerElapsed = 0;
let timerRunning = false;
let timerInterval = null;
let fontSize = 30;

function loadBlocks(){
  try{
    const raw = localStorage.getItem('lw_blocks');
    if(raw){
      const all = JSON.parse(raw);
      visibleBlocks = all.filter(b=>!b.hideInPodium);
    }
  }catch(e){}
  if(visibleBlocks.length===0){
    visibleBlocks=[
      {id:'demo1',type:'title',       text:'João 15:1-8 — A Videira Verdadeira'},
      {id:'demo2',type:'verse',       text:'João 15:5 — "Eu sou a videira, vós as varas; quem permanece em mim e eu nele, esse dá muito fruto; porque sem mim nada podeis fazer."'},
      {id:'demo3',type:'big_idea',    text:'Separados de Cristo, somos incapazes de produzir fruto que dure.'},
      {id:'demo4',type:'point',       text:'1. A Videira é a única fonte de vida verdadeira'},
      {id:'demo5',type:'illustration',text:'Imagine um galho cortado de uma árvore. Pode parecer verde por dias, mas sem conexão com a raiz, a morte é certa. Assim é a vida espiritual sem Cristo.'},
      {id:'demo6',type:'application', text:'Que disciplinas espirituais te mantêm conectado à Videira esta semana?'},
      {id:'demo7',type:'point',       text:'2. Permanecer exige escolha diária, não apenas decisão pontual'},
      {id:'demo8',type:'conclusion',  text:'Toda a nossa eficácia ministerial depende não do nosso esforço, mas da nossa conexão com Cristo.'},
      {id:'demo9',type:'call',        text:'Hoje: identifique o que está drenando sua conexão com a Videira e elimine.'},
    ];
  }
  render();
  buildOutline();
  buildDots();
}

function render(){
  if(visibleBlocks.length===0)return;
  currentIdx = Math.max(0,Math.min(currentIdx,visibleBlocks.length-1));
  const b = visibleBlocks[currentIdx];
  const t = TYPES[b.type]||TYPES.note;

  const lbl = document.getElementById('currentTypeLabel');
  lbl.textContent = `${t.icon}  ${t.label}`;
  lbl.style.color = t.color;

  const txt = document.getElementById('currentText');
  txt.textContent = b.text;
  txt.className = 'block-text type-'+(b.type||'note');
  txt.style.fontSize = fontSize+'px';
  txt.style.fontWeight = (b.type==='title'||b.type==='big_idea'||b.type==='point'||b.type==='conclusion'||b.type==='call')?'600':'400';

  document.getElementById('blockCounter').textContent=`${currentIdx+1}/${visibleBlocks.length}`;
  document.getElementById('btnPrev').disabled = currentIdx===0;
  document.getElementById('btnNext').disabled = currentIdx===visibleBlocks.length-1;

  updateDots();
  updateOutline();
}

function buildOutline(){
  const ol = document.getElementById('bottomOutline');
  ol.innerHTML='';
  visibleBlocks.forEach((b,i)=>{
    const t=TYPES[b.type]||TYPES.note;
    const chip = document.createElement('button');
    chip.className='ol-chip';
    chip.id='chip-'+i;
    chip.style.cssText=`background:#111;color:#444;border-color:#1a1a1a`;
    chip.innerHTML=`${t.icon} ${b.text.substring(0,20)+(b.text.length>20?'…':'')}`;
    chip.onclick=()=>{ currentIdx=i; render(); };
    ol.appendChild(chip);
  });
}

function updateOutline(){
  visibleBlocks.forEach((_,i)=>{
    const chip=document.getElementById('chip-'+i);
    if(!chip)return;
    const t=TYPES[visibleBlocks[i].type]||TYPES.note;
    if(i===currentIdx){
      chip.style.cssText=`background:${t.color}22;color:${t.color};border-color:${t.color}66`;
    } else if(i<currentIdx){
      chip.style.cssText=`background:#0d0d0d;color:#333;border-color:#181818`;
    } else {
      chip.style.cssText=`background:#111;color:#444;border-color:#1a1a1a`;
    }
  });
}

function buildDots(){
  const wrap=document.getElementById('progressDots');
  wrap.innerHTML='';
  visibleBlocks.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pdot';
    d.id='dot-'+i;
    d.onclick=()=>{currentIdx=i;render()};
    d.style.cursor='pointer';
    wrap.appendChild(d);
  });
}

function updateDots(){
  visibleBlocks.forEach((_,i)=>{
    const d=document.getElementById('dot-'+i);
    if(!d)return;
    d.className='pdot'+(i<currentIdx?' done':i===currentIdx?' current':'');
  });
}

function go(dir){
  const ni=currentIdx+dir;
  if(ni<0||ni>=visibleBlocks.length)return;
  currentIdx=ni; render();
}

function setFontSize(v){
  fontSize=+v;
  document.getElementById('fontSizeLabel').textContent=v;
  document.getElementById('currentText').style.fontSize=v+'px';
}

function setTimerMin(v){
  const m=Math.max(1,Math.min(180,+v));
  timerTotal=m*60;
  resetTimer();
}

function resetTimer(){
  clearInterval(timerInterval);
  timerRunning=false; timerElapsed=0;
  updateTimerDisplay();
  document.getElementById('timerAction').textContent='▶ Iniciar';
  document.getElementById('timerBar').style.width='0%';
  document.getElementById('timerBar').style.background='#44DD88';
}

function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval); timerRunning=false;
    document.getElementById('timerAction').textContent='▶ Continuar';
  } else {
    timerInterval=setInterval(()=>{
      timerElapsed++;
      updateTimerDisplay();
    },1000);
    timerRunning=true;
    document.getElementById('timerAction').textContent='⏸ Pausar';
  }
}

function updateTimerDisplay(){
  const remaining=Math.max(0,timerTotal-timerElapsed);
  const mm=String(Math.floor(remaining/60)).padStart(2,'0');
  const ss=String(remaining%60).padStart(2,'0');
  document.getElementById('timerDisplay').textContent=`${mm}:${ss}`;
  const pct=timerTotal>0?Math.min(1,timerElapsed/timerTotal):0;
  const color = pct>0.9?'#FF4444':pct>0.75?'#FF9900':'#44DD88';
  const bar=document.getElementById('timerBar');
  bar.style.width=(pct*100)+'%';
  bar.style.background=color;
  document.getElementById('timerDisplay').style.color=color;
  if(remaining===0&&timerRunning){ clearInterval(timerInterval); timerRunning=false; document.getElementById('timerAction').textContent='Encerrado'; }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();go(1);}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(-1);}
  if(e.key==='Escape')window.close();
});

loadBlocks();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <title>Living Word — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #F5F0E8;
      color: #3D2B1F;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 380px;
      background: #fff;
      border-radius: 20px;
      padding: 48px 32px;
      box-shadow: 0 4px 24px rgba(61,43,31,0.08);
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: rgba(107,79,58,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #3D2B1F;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #6B4F3A;
      margin-bottom: 24px;
    }
    .verse {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      color: #C4956A;
      margin-bottom: 28px;
    }
    button {
      background: #6B4F3A;
      color: #F5F0E8;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Você está offline</h1>
    <p>Parece que sua conexão com a internet caiu. Reconecte-se para continuar usando o Living Word.</p>
    <p class="verse">"O Senhor é a minha luz e a minha salvação." — Salmo 27:1</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>

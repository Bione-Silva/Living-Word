<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Living Word — Ensine, escreva e publique a Palavra em PT, EN e ES</title>

    <meta name="author" content="Living Word" />
    <meta name="keywords" content="sermão, devocional, blog cristão, ensino bíblico, pastor, evangélico, trilíngue, IA pastoral, conteúdo cristão, Living Word" />
    <link rel="canonical" href="https://livingword.app" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3D2B1F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Living Word" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://livingword.app" />
    <meta property="og:site_name" content="Living Word" />
    <meta property="og:title" content="Living Word — Ensine, escreva e publique a Palavra em 3 idiomas" />
    <meta property="og:description" content="Transforme sermões e estudos em devocionais, artigos e blogs publicados automaticamente. Feito para pastores e líderes do ecossistema evangélico global." />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@livingwordapp" />
    <meta name="twitter:title" content="Living Word — Ensine, escreva e publique a Palavra" />
    <meta name="twitter:description" content="Plataforma trilíngue para pastores e líderes evangélicos. Do sermão ao blog publicado em 60 segundos." />

    <link rel="icon" type="image/png" href="/icon-192.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Living Word",
      "alternateName": ["Palavra Viva", "Palabra Viva"],
      "applicationCategory": "ProductivityApplication",
      "description": "Plataforma cristã trilíngue para pastores e líderes evangélicos. Transforme sermões e estudos bíblicos em devocionais, artigos e blogs publicados automaticamente.",
      "operatingSystem": "Web",
      "url": "https://livingword.app",
      "inLanguage": ["pt", "en", "es"],
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "name": "Free",
          "description": "5 gerações por mês, sermão + esboço, 1 artigo, blog no ar"
        },
        {
          "@type": "Offer",
          "price": "9",
          "priceCurrency": "USD",
          "name": "Pastoral",
          "description": "40 gerações por mês, todos os formatos, 20 artigos, sem watermark"
        }
      ],
      "audience": {
        "@type": "Audience",
        "audienceType": "Pastores, líderes evangélicos, ensinadores bíblicos, criadores de conteúdo cristão"
      }
    }
    </script>

    <!-- FAQPage Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "A IA substitui o pastor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. O Living Word é um copiloto de ensino bíblico — como um comentário bíblico digital. Você continua ensinando e pregando. A IA ajuda a preparar, escrever e publicar conteúdo devocional e artigos cristãos a partir do seu ensino."
          }
        },
        {
          "@type": "Question",
          "name": "Para quem o Living Word foi feito?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para pastores, líderes de célula, ensinadores bíblicos, criadores de conteúdo cristão e ministérios do ecossistema evangélico global. Suporta tradições como batista, pentecostal, carismática, reformada e outras."
          }
        },
        {
          "@type": "Question",
          "name": "O Living Word cria blog cristão automaticamente?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Ao se cadastrar, seu blog devocional (seu-nome.livingword.app) já está no ar. Artigos e devocionais são publicados automaticamente com seu nome, prontos para compartilhar com sua congregação."
          }
        },
        {
          "@type": "Question",
          "name": "Posso transformar sermão em artigo de blog?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Você informa a passagem bíblica, o público e o contexto. O Living Word transforma seu sermão em artigo de blog cristão, devocional, esboço, pontos para Reels e mais — tudo em uma geração, pronto para publicação automática."
          }
        },
        {
          "@type": "Question",
          "name": "O Living Word funciona em português, inglês e espanhol?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O Living Word é trilíngue nativo — gera conteúdo cristão em português, inglês e espanhol com voz pastoral nativa em cada idioma, não tradução automática. Ideal para ministérios que atendem congregações multilíngues."
          }
        },
        {
          "@type": "Question",
          "name": "Preciso ter site ou WordPress para usar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. O Living Word cria seu blog cristão automaticamente no cadastro. Você não precisa de WordPress, designer ou equipe de mídia. Seu ministério ganha presença digital imediata."
          }
        },
        {
          "@type": "Question",
          "name": "Que tipos de conteúdo o Living Word gera?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Em uma única geração: sermão completo, esboço de pregação, devocional diário, pontos para Reels, versão bilíngue, adaptação para célula e artigo de blog cristão. São mais de 7 formatos de conteúdo de ensino bíblico prontos para circular."
          }
        },
        {
          "@type": "Question",
          "name": "O conteúdo mantém fidelidade bíblica?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O Living Word usa guardrails teológicos reais: exegese antes de aplicação, distinção entre texto, interpretação e aplicação, e alerta de eisegese integrado. O conteúdo respeita sua linha doutrinária e sua voz de ensino."
          }
        },
        {
          "@type": "Question",
          "name": "Posso usar o Living Word sendo líder de célula ou ministério pequeno?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O plano gratuito já inclui 5 gerações por mês, sermão, esboço, artigo devocional e blog no ar. Líderes de célula e ministérios pequenos usam o Living Word para chegar toda semana com material de ensino bíblico pronto."
          }
        },
        {
          "@type": "Question",
          "name": "Precisa de cartão para o trial de 7 dias?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. O trial de 7 dias do plano Pastoral é sem cartão de crédito. Só solicitamos pagamento no 8º dia se você quiser continuar com acesso completo a todos os formatos e publicação automática."
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
